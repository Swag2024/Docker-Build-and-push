name: tictoc-app
on: 
  push:
    branches: main

  pull_request: 
    branches: main

jobs:
  test:
    name: unit Testing
    runs-on: ubuntu-latest
    steps:
    -  name: checkout
       uses: actions/checkout@v5
    -  name: setup node.js
       uses: actions/setup-node@v4
       with: 
         node-version: 24
    -  name: install dependency
       run: npm ci
    -  name: run test
       run : npm test
  lint:
    name: static code analysis
    runs-on: ubuntu-latest
    steps:
    -  name: checkout 
       uses: actions/checkout@v5
    -  name: setup node.js
       uses: actions/setup-node@v4
       with:
         node-version: 24
    -  name: install dependency
       run: npm ci
    -  name: Run Eslint
       run: npm run lint
  build:
    name:  build
    needs: [test,lint]
    runs-on: ubuntu-latest
    steps:
    -  name: checkout
       uses: actions/checkout@v5
    -  name: setup node.js
       uses: actions/setup-node@v4
       with:
         node-version: 24
    -  name: install dependency
       run: npm ci
    -  name: build project
       run: npm run build
    -  name: publish artifact
       uses: actions/upload-artifact@v4
       with:
         name: build artifact
         path: dist/
  docker:
    name: docker build and push
    runs-on: ubuntu-latest
    needs: [build]
    env: 
      REGISTRY: ghcr.io
      IMAGE_NAME: tictoc
    outputs:
       image_tag: ${{ steps.set_output.outputs.image_tag }}
    steps:
    -  name: checkout
       uses: actions/checkout@v5
    -  name: download & build artifacts
       uses: actions/download-artifact@v4
       with:
         name: build artifact
         path: dist/
    -  name: set up docker buildx
       uses: docker/setup-buildx-action@v3
    -  name: Login to GitHub Container Registry
       uses: docker/login-action@v3
       with:
         registry: ${{ env.REGISTRY }}
         username: ${{ github.actor }}
         password: ${{ secrets.TOKEN }}
    -  name: metadata for docker
       id: meta
       uses: docker/metadata-action@v5
       with:
         images: ghcr.io/swag2024/tictoc
         tags: |
           type=raw,value=latest
           type=sha,format=long
    -  name: build docker imgae
       uses: docker/build-push-action@v5
       with:
         context: .
         push: false
         tags : ${{ steps.meta.outputs.tags }}
         load: true
    -  name: runtrivy
       uses: aquasecurity/trivy-action@master
       with:
         image-ref : ghcr.io/swag2024/tictoc
         format : 'table'
         exit-code : '1'
         ignore-unfixed : true
         vuln-type : 'os,library'
         severity: 'HIGH'
    -  name : docker push
       uses: docker/build-push-action@v5
       with:
         context : .
         push: true
         tags : ${{ steps.meta.outputs.tags }}
    -  name: image tag output
       id: set_output
       run: echo "image_tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
  update-k8s:
    name: Update Kubernetes Deployment
    runs-on: ubuntu-latest
    needs: ['docker']
    if : github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      -  name: checkout code
         uses: actions/checkout@v5
      -  name: setup config
         run: |
           git config user.name "Github Actions"
           git config user.email "actions@github.com"
      -  name: Update Kubernetes deployment file
         env:
          IMAGE_TAG: sha-${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REGISTRY: ghcr.io
         run: |
           NEW_IMAGE= "ghcr.io/swag2024/tictoc:${IMAGE_TAG}"
           sed -i "s|image: ${REGISTRY}/.*|image: ${NEW_IMAGE}|g" kubernetes/deployment.yaml
           echo "Updated deployment to use image: ${NEW_IMAGE}"
           grep -A 1 "image:" kubernetes/deployment.yaml
      -  name: push and commit
         run: |
           git add kubernetes/deployment.yaml
           git commit -m "update yaml"
           git push
         
         
         
  

         
         
         
           
         
         
      
      
  
       
    
      
    

